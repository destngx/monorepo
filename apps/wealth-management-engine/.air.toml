root = "."
tmp_dir = "tmp/air"

[build]
cmd = "go build -o ./tmp/air/engine main.go"
bin = "./tmp/air/engine"
full_bin = "./tmp/air/engine"
include_ext = ["go"]
exclude_dir = ["tmp", "vendor"]
exclude_regex = ["_test\\.go"]
delay = 200
stop_on_error = true

[log]
time = true

[screen]
clear_on_rebuild = true
