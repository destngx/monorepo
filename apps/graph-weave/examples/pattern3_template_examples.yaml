# Pattern 3: Template-based Workflow Examples

# Example 1: Simple Search Template
---
id: search_template
name: Web Search Template
description: A simple web search workflow template
version: 1.0.0

variables:
  - name: query
    type: string
    description: Search query
    required: true
  - name: max_results
    type: number
    description: Maximum number of results
    required: false
    default: 10

nodes:
  - id: search
    name: Search Web
    description: Search the web for information
    operator: web_search
    config:
      query: "{{query}}"
      max_results: "{{max_results}}"
    timeout_seconds: 30

start_node_id: search
end_node_ids:
  - search

tags:
  - search
  - simple

---
# Example 2: Research Pipeline Template
id: research_pipeline
name: Research Pipeline
description: Multi-step research workflow with parallel operations
version: 1.0.0

variables:
  - name: topic
    type: string
    description: Research topic
    required: true
    pattern: "^[a-zA-Z0-9\\s\\-]+$"
  - name: max_articles
    type: number
    description: Maximum articles to fetch
    required: false
    default: 5
  - name: summary_length
    type: number
    description: Summary length in words
    required: false
    default: 500

nodes:
  - id: search_web
    name: Search Web
    description: Search the web
    operator: web_search
    config:
      query: "{{topic}}"
      max_results: "{{max_articles}}"
    timeout_seconds: 30

  - id: search_academic
    name: Search Academic
    description: Search academic databases
    operator: academic_search
    config:
      query: "{{topic}}"
      max_results: "{{max_articles}}"
    timeout_seconds: 45

  - id: fetch_results
    name: Fetch Results
    description: Fetch full content from search results
    operator: fetch_url
    config:
      urls: "{{search_results}}"
    dependencies:
      - search_web
      - search_academic
    timeout_seconds: 120
    retry_policy:
      max_attempts: 3
      backoff_strategy: exponential

  - id: analyze
    name: Analyze Content
    description: Analyze fetched content
    operator: llm_call
    config:
      prompt: "Analyze the following research content: {{content}}"
      model: gpt-4
      temperature: 0.7
    dependencies:
      - fetch_results
    timeout_seconds: 60

  - id: summarize
    name: Summarize
    description: Create a summary
    operator: llm_call
    config:
      prompt: "Create a {{summary_length}} word summary of: {{analysis}}"
      model: gpt-4
      temperature: 0.5
    dependencies:
      - analyze
    timeout_seconds: 45

start_node_id: search_web
end_node_ids:
  - summarize

tags:
  - research
  - complex
  - parallel

---
# Example 3: Data Processing Template
id: data_processing
name: Data Processing Pipeline
description: ETL-style data processing workflow
version: 1.0.0

variables:
  - name: input_file
    type: string
    description: Input file path
    required: true
  - name: output_file
    type: string
    description: Output file path
    required: true
  - name: processing_script
    type: string
    description: Python script for processing
    required: true

nodes:
  - id: read_input
    name: Read Input
    description: Read input file
    operator: file_read
    config:
      path: "{{input_file}}"
    timeout_seconds: 30

  - id: process_data
    name: Process Data
    description: Process the data
    operator: python_script
    config:
      script: "{{processing_script}}"
    dependencies:
      - read_input
    timeout_seconds: 300

  - id: write_output
    name: Write Output
    description: Write processed data to output file
    operator: file_write
    config:
      path: "{{output_file}}"
      content: "{{processed_data}}"
    dependencies:
      - process_data
    timeout_seconds: 30

start_node_id: read_input
end_node_ids:
  - write_output

tags:
  - etl
  - data-processing
  - sequential
